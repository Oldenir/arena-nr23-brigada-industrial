<!doctype html>
<html lang="pt-BR" data-page="self-test">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111318">
    <title>Autoteste</title>
    <link rel="icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/self-test.css">
    <script type="module" src="/assets/js/branding.js"></script>
    <script type="module" src="/assets/js/self-test.js"></script>
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="/">
        <img src="/assets/images/arena-shield.svg" data-brand-logo alt="" width="54" height="54">
        <span>
          <strong data-brand-company-name></strong>
          <small>SELF-TEST DE PRODUÇÃO</small>
        </span>
      </a>
      <div class="header-actions">
        <span id="summaryChip" class="status-chip">aguardando</span>
      </div>
    </header>

    <main class="self-test-shell">
      <section class="self-test-hero" aria-labelledby="selfTestTitle">
        <div>
          <p class="eyebrow">Diagnóstico local</p>
          <h1 id="selfTestTitle">Verificação rápida da <span data-brand-company-short></span></h1>
          <p>Execute antes da aula para conferir API, persistência, catálogos e regras de normalização.</p>
        </div>
        <button id="runTestBtn" class="button primary" type="button">Executar self-test</button>
      </section>

      <section class="self-test-grid" aria-live="polite">
        <article class="self-test-card">
          <strong id="overallStatus">Aguardando execução</strong>
          <span id="overallDetail">Nenhuma alteração será feita nas sessões reais.</span>
        </article>
        <div id="testList" class="test-list"></div>
      </section>
    </main>
  </body>
</html>
